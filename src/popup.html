<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title id="popup-title"></title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <header class="top-header">
      <div class="title-row">
        <div class="title-group">
          <span id="popup-heading" class="title"></span>
          <span id="tz-label" class="tz-label"></span>
        </div>
        <div class="header-actions">
          <button id="add-event" class="icon-btn" title="">＋</button>
          <button id="open-options" class="icon-btn" title="">⚙</button>
          <button id="close-popup" class="icon-btn" title="">✕</button>
        </div>
      </div>
      <div class="date-row">
        <button id="today-date" class="link-btn"></button>
      </div>
    </header>

    <div class="toolbar">
      <button id="go-today" class="pill-btn"></button>
      <button id="prev-day" class="icon-btn">‹</button>
      <button id="next-day" class="icon-btn">›</button>
    </div>

    <div id="message" class="message hidden"></div>

    <section id="all-day-section" class="all-day hidden">
      <div id="all-day-events" class="all-day-events"></div>
    </section>

    <section class="timeline-wrap">
      <div class="timeline">
        <div id="time-labels" class="time-labels"></div>
        <div id="grid" class="grid"></div>
      </div>
    </section>

    <template id="event-template">
      <article class="event-card">
        <h3 class="event-title"></h3>
        <p class="event-time"></p>
      </article>
    </template>

    <div id="event-popup-overlay" class="event-popup-overlay hidden">
      <div class="event-popup">
        <div class="event-popup-header">
          <h3 class="event-popup-title"></h3>
          <button class="event-popup-close icon-btn">✕</button>
        </div>
        <p class="event-popup-time"></p>
        <a class="event-popup-location"></a>
        <p class="event-popup-description"></p>
        <a class="event-popup-link"></a>
      </div>
    </div>

    <script type="module" src="./popup.ts"></script>
  </body>
</html>
